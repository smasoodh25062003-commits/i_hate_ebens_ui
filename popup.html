<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      width: 240px;
      padding: 20px;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    p {
      font-size: 11px;
      color: #5a6080;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 16px rgba(99,102,241,.35);
      transition: all .15s;
    }
    button:hover { opacity: .9; transform: translateY(-1px); }
    #msg {
      margin-top: 12px;
      font-size: 11px;
      color: #f87171;
      display: none;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>⚡ e-Bens Scheduler</h2>
  <p>Opens the scheduler on your active e-Benefits tab.</p>
  <button id="launch">Launch Scheduler</button>
  <div id="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
